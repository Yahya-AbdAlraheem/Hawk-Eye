            #project-name {
                display: block;
                font-size: 48px;
                font-family: 'Georgia', 'Times New Roman', serif; 
                font-weight: bold;
                color:rgb(255, 255, 255);
                text-decoration: none; 
                animation: slideDown 2s ease-out forwards;
                position: absolute; 
                top: 40px; 
                left: 20px;
                padding: 10px 20px;
                background-color: rgba(0, 0, 0, 0.5);
                border-radius: 10px;
            }
            @keyframes slideDown {
                0% {
                    transform: translateY(-100px);
                    opacity: 0;
                }
                100%{
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            .caption-container {
                max-height: 300px;
                position: relative;
                /* top: 380px;
                right: 13%; */
                padding: 15px;
                transform: translateX(-50%);
                border: 2px solid #fff;
                border-radius: 20px;
                background-color: rgba(0, 0, 0, 0.7);
                box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
                text-align: center;
                color: #ffffff;
                width: 400px;
                opacity: 0; /* تبدأ مخفية */
                animation: slideDown 2s ease-out forwards;
            }
            @keyframes slideDown {
                0% {
                    transform: translateY(-100px);
                    opacity: 0;
                }
                100% {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            .caption-input {
                width: 90%;
                padding: 10px;
                margin: 15px 0;
                border: none;
                border-radius: 5px;
                font-size: 16px;
                background-color: #333333;
                color: #ffffff;
                outline: none;
                transition: box-shadow 0.3s ease;
            }

            .caption-input:focus {
                box-shadow: 0px 0px 8px 2px #324456;
            }

            button {
                width: 95%;
                padding: 10px;
                background-color: #324456;
                color: #000000;
                border: none;
                border-radius: 5px;
                font-size: 16px;
                cursor: pointer;
                transition: background-color 0.3s ease, transform 0.2s ease;
            }

            button:hover {
                background-color: #36a5be;
                transform: scale(1.05);
            }

        .container {
    text-align: center;
    color: #F4E49B;
    font-family: 'Arial', sans-serif;

}

.welcome {

}

.hawkeye {
    font-size: 50px;
    font-weight: bold;
    letter-spacing: 6px;
    position: relative;
}

.line {
    width: 80px;
    height: 3px;
    background-color: #F4E49B;
    margin: 10px auto;
    position: relative;
}

.line::before, .line::after {
    content: "";
    width: 10px;
    height: 10px;
    background-color: #F4E49B;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
}

.line::before {
    left: -15px;
}

.line::after {
    right: -15px;
}
