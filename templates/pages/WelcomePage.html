{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Hawk Eye</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background-color: #0d1b2a;
            color: white;
        }

        .logo {
            margin-top: 60px;
            text-align: center;
        }

        .logo img {
            width: 120px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            margin: 20px 0;
            letter-spacing: 3px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            background-color: #1b263b;
            padding: 18px 40px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            min-width: 280px;
            text-align: center;
        }

        .btn:hover {
            background-color: #415a77;
        }

        .footer {
            margin-bottom: 30px;
            font-size: 14px;
            color: #a3bcd4;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="{% static 'images/hawk-logo.png' %}" alt="Hawk Eye Logo">
        <div class="title">HAWK EYE</div>
    </div>

    <div class="buttons">
        <button class="btn" onclick="window.location.href=''">Check for leaks</button>
        <button class="btn" onclick="window.location.href=''">Check password</button>
    </div>

    <div class="footer">Hawk Eye – Keep your data safe</div>
</body>
</html>
