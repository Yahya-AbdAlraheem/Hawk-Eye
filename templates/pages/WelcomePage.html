{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawk Eye</title>
    <style>
        nav {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            display: flex;
            flex-direction: row;  /* Changed from column to row */
            justify-content: center; /* Center links */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%; 
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        nav a {
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.3);
            color: black;
            font-weight: bold;
            border-radius: 8px;
        }

        nav a.active {
            background-color: rgba(255, 255, 255, 0.3);
            color: black;
            font-weight: bold;
            border-radius: 8px;
        }

        body {
            font-family: Arial, sans-serif;
            margin-top: 70px; /* Give space for the fixed navbar */
        }
    </style>
</head>
<body>

<nav>
    <div style="display: flex; align-items: center;">
        <img src="{% static '/images/yahya.jpg' %}" alt="Hawk Logo" style="height: 40px; margin-right: 20px;">
    </div>
    <a href="{% url 'HomePage' %}">Home</a>
    <a href="{% url 'CreatePassword' %}">Check Password</a>
    <a href="{% url 'whois_lookup' %}">Whois Lookup</a>
    <a href="{% url 'AboutUs' %}">About Us</a>
    <a href="{% url 'Contact' %}">Contact</a>
    <a href="{% url 'admin:index' %}">Admin</a>
</nav>

<!-- Page Content -->
{% block content %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Hawk Eye</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background-color: #0d1b2a;
            color: white;
        }

        .logo {
            margin-top: 60px;
            text-align: center;
        }

        .logo img {
            width: 120px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            margin: 20px 0;
            letter-spacing: 3px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            background-color: #1b263b;
            padding: 18px 40px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            min-width: 280px;
            text-align: center;
        }

        .btn:hover {
            background-color: #415a77;
        }

        .footer {
            margin-bottom: 30px;
            font-size: 14px;
            color: #a3bcd4;
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="title">HAWK EYE</div>
        <img src="{% static 'images\WhatsApp Image 2025-04-15 at 01.11.43_d81f169a.jpg' %}" alt="Hawk Logo" style="height: 150px; margin-right: 20px;">
    </div>

    <div class="buttons">
        <button class="btn" onclick="window.location.href='hawk-eye'">Get Started</button>
    </div>

    <div class="footer">Hawk Eye – Keep your data safe</div>
</body>
</html>

{% endblock %}

</body>
</html>
