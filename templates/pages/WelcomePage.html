{% load static %} 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawk Eye</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('{% static "images/welcomePhoto.jpg" %}');
            background-size: cover;
            background-position: center;
            background-color: #000000;
        }
        .title {
            position: absolute;
            top: 30px;
            left: 45px;
            font-size: 48px; 
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #ffffff; 
        }
        .start-button {
            position: absolute;
            bottom: 80px;
            font-size: 24px;
            padding: 15px 30px;
            background: linear-gradient(#36a5be , #324456 , #000000 );
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        .start-button:hover {
            background: linear-gradient(#8dabc0 , #324456 , #000000 );
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        .start-button:active {
            transform: scale(0.95);
            background: linear-gradient(#8dabc0 , #324456 , #000000 );
        }
    </style>
</head>
<body>
    <div class="title">Hawk Eye</div>
    <button class="start-button" onclick="window.location.href='{% url 'HomePage' %}'">Get Started</button>
</body>
</html>
